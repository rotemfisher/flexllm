services:

  # ── Python Chainlit app — LangGraph coaching agent ───────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flexllm-app
    restart: unless-stopped
    environment:
      ENVIRONMENT: prod
      DB_PATH: /data/personal/running.db
      QDRANT_PATH: /data/qdrant_db
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-coaching_books}
      MODEL_ID: ${MODEL_ID:-qwen2.5:32b}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-large-en-v1.5}
      # Ollama runs on the host machine (GPU access). host.docker.internal resolves
      # to the host on Docker Desktop (Mac/Win). On Linux, extra_hosts maps it below.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Auth
      APP_PASSWORD: ${APP_PASSWORD:?APP_PASSWORD must be set in .env}
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:?CHAINLIT_AUTH_SECRET must be set in .env}
      # Tracing (optional)
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-flexllm-prod}
      # Chainlit data persistence — appends tables to the existing running.db
      CHAINLIT_DATABASE_URL: sqlite:////data/personal/running.db
    volumes:
      # Athlete data, Qdrant store, and LangGraph checkpoints
      - ./data:/data:rw
      # Embedding model cache to avoid re-downloading on every restart
      - model_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - flexllm
    # Allow the app to reach Ollama on the host (Linux only; Docker Desktop auto-resolves)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      start_period: 180s
      retries: 5

  # ── Cloudflare Tunnel sidecar ─────────────────────────────────────────────────
  # Ephemeral mode (default): prints a random *.trycloudflare.com URL to logs.
  # Persistent mode: set CLOUDFLARE_TUNNEL_TOKEN in .env → maps to your domain.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flexllm-cloudflared
    restart: unless-stopped
    # Share the app container's network so cloudflared can reach localhost:8000
    network_mode: service:app
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    # Shell wrapper: use token (persistent domain) when set, else ephemeral URL
    entrypoint: /bin/sh
    command: >
      -c 'if [ -n "$$CLOUDFLARE_TUNNEL_TOKEN" ];
          then exec cloudflared tunnel --no-autoupdate --token "$$CLOUDFLARE_TUNNEL_TOKEN";
          else exec cloudflared tunnel --no-autoupdate --url http://localhost:8000;
          fi'
    depends_on:
      app:
        condition: service_healthy

volumes:
  model_cache:
    name: flexllm-model-cache

networks:
  flexllm:
    driver: bridge
