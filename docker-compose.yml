services:

  # ── Qdrant vector database ────────────────────────────────────────────────────
  # Runs as its own service so it can be restarted independently of the app and
  # so the storage is not locked by a single process.  The app connects via HTTP
  # (QDRANT_URL=http://qdrant:6333) rather than the embedded file-path client.
  #
  # First-run: populate with  docker compose run --rm app python etl/embed_books.py
  # (embed_books.py respects QDRANT_URL automatically via src/config.py)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: flexllm-qdrant
    restart: unless-stopped
    volumes:
      # Reuse the same directory embed_books.py already populated locally.
      - ./data/qdrant_db:/qdrant/storage:rw
    networks:
      - flexllm
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Python Chainlit app — LangGraph coaching agent ───────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flexllm-app
    restart: unless-stopped
    environment:
      ENVIRONMENT: prod
      DB_PATH: /data/personal/running.db
      # Use the Qdrant service instead of the embedded file client.
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-coaching_books}
      MODEL_ID: ${MODEL_ID:-qwen2.5:32b}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-large-en-v1.5}
      # Ollama runs on the host machine (GPU/Metal access).
      # host.docker.internal resolves to the host on Docker Desktop (Mac/Win).
      # On Linux the extra_hosts entry below maps it via host-gateway.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Auth
      APP_PASSWORD: ${APP_PASSWORD:?APP_PASSWORD must be set in .env}
      CHAINLIT_AUTH_SECRET: ${CHAINLIT_AUTH_SECRET:?CHAINLIT_AUTH_SECRET must be set in .env}
      # Tracing (optional)
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-flexllm-prod}
      # Chainlit data persistence — appends tables to the existing running.db
      CHAINLIT_DATABASE_URL: sqlite:////data/personal/running.db
    volumes:
      - ./data:/data:rw
      - model_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - flexllm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      start_period: 180s
      retries: 5

  # ── Apple Health file watcher ─────────────────────────────────────────────────
  # Watches data/personal/apple_health_export/ for a new or updated export.xml
  # (or ייצוא.xml) and automatically runs the ETL pipeline.
  # Drop your Apple Health export into data/personal/apple_health_export/ on the
  # host and the DB will be updated within ~3 seconds.
  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flexllm-watcher
    restart: unless-stopped
    command: python etl/watch_health.py
    environment:
      HEALTH_EXPORT_DIR: /data/personal/apple_health_export
      DB_PATH: /data/personal/running.db
      # Needed so ingest_health.py can import src/ without installing the package
      PYTHONPATH: /app
    volumes:
      - ./data:/data:rw
    networks:
      - flexllm
    depends_on:
      - app

  # ── Cloudflare Tunnel sidecar ─────────────────────────────────────────────────
  # Ephemeral mode (default): prints a random *.trycloudflare.com URL to logs.
  # Persistent mode: set CLOUDFLARE_TUNNEL_TOKEN in .env → maps to your domain.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flexllm-cloudflared
    restart: unless-stopped
    network_mode: service:app
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    entrypoint: /bin/sh
    command: >
      -c 'if [ -n "$$CLOUDFLARE_TUNNEL_TOKEN" ];
          then exec cloudflared tunnel --no-autoupdate --token "$$CLOUDFLARE_TUNNEL_TOKEN";
          else exec cloudflared tunnel --no-autoupdate --url http://localhost:8000;
          fi'
    depends_on:
      app:
        condition: service_healthy

volumes:
  model_cache:
    name: flexllm-model-cache

networks:
  flexllm:
    driver: bridge
